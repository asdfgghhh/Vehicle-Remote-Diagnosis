server:
  port: 8083

spring:
  application:
    name: service-ecu-log
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# 存储类型（从 Nacos shared-config 继承完整配置）
storage:
  type: MINIO

file:
  log:
    temp-path: /data/vrd/logs/temp

clickhouse:
  enabled: true
  host: localhost
  port: 8123
  database: vrd_bigdata
  username: default
  password:
  connection-timeout: 10000
  socket-timeout: 30000
  query-timeout-seconds: 10
  default-days: 7
  max-page-size: 100
