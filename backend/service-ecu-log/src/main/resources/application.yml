server:
  port: 8083

spring:
  application:
    name: service-ecu-log
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

storage:
  type: LOCAL
  local:
    base-path: /data/vrd/storage
    base-url: http://localhost:8080/storage
  aliyun-oss:
    endpoint: https://oss-cn-hangzhou.aliyuncs.com
    access-key-id: your-access-key-id
    access-key-secret: your-access-key-secret
    bucket-name: your-bucket-name
    base-url: https://your-bucket-name.oss-cn-hangzhou.aliyuncs.com
  huawei-obs:
    endpoint: https://obs.cn-north-4.myhuaweicloud.com
    access-key-id: your-access-key-id
    secret-access-key: your-secret-access-key
    bucket-name: your-bucket-name
    base-url: https://your-bucket-name.obs.cn-north-4.myhuaweicloud.com
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: vrd-logs
    base-url: http://localhost:9000/vrd-logs

file:
  log:
    temp-path: /data/vrd/logs/temp

clickhouse:
  enabled: true
  host: localhost
  port: 8123
  database: vrd_bigdata
  username: default
  password:
  connection-timeout: 10000
  socket-timeout: 30000
  query-timeout-seconds: 10
  default-days: 7
  max-page-size: 100
