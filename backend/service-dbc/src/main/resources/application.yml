server:
  port: 8084

spring:
  application:
    name: service-dbc
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/vrd_dbc?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root123
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

storage:
  type: LOCAL
  local:
    base-path: /data/vrd/storage
    base-url: http://localhost:8080/storage
  aliyun-oss:
    endpoint: https://oss-cn-hangzhou.aliyuncs.com
    access-key-id: your-access-key-id
    access-key-secret: your-access-key-secret
    bucket-name: your-bucket-name
    base-url: https://your-bucket-name.oss-cn-hangzhou.aliyuncs.com
  huawei-obs:
    endpoint: https://obs.cn-north-4.myhuaweicloud.com
    access-key-id: your-access-key-id
    secret-access-key: your-secret-access-key
    bucket-name: your-bucket-name
    base-url: https://your-bucket-name.obs.cn-north-4.myhuaweicloud.com
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: your-bucket-name
    base-url: http://localhost:9000/your-bucket-name

file:
  dbc:
    upload-path: /data/vrd/dbc
