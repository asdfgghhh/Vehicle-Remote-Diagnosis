spring:
  application:
    name: service-dbc
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:124.221.104.56:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: ${NACOS_SERVER_ADDR:124.221.104.56:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml
        shared-configs:
          - data-id: application.yml
            group: ${NACOS_GROUP:DEFAULT_GROUP}
            refresh: true
        extension-configs:
          - data-id: ${spring.application.name}.yml
            group: ${NACOS_GROUP:DEFAULT_GROUP}
            refresh: true
        refresh-enabled: true

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
