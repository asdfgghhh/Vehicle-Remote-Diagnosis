server:
  port: 9086

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:124.221.104.56}:${DB_PORT:3306}/vrd_access?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:124.221.104.56}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:3000ms}
      password: ${REDIS_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:124.221.104.56:9092}
    consumer:
      group-id: access-ingest
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

mqtt:
  url: ${MQTT_URL:tcp://localhost:1883}
  username: ${MQTT_USERNAME:admin}
  password: ${MQTT_PASSWORD:public}
  client-id: ${MQTT_CLIENT_ID:vrd-access-client}
  topic: ${MQTT_TOPIC:vehicle/signal/+}
  qos: 1

kafka:
  topics:
    vehicle-signals: vehicle-signals

clickhouse:
  enabled: ${CLICKHOUSE_ENABLED:true}
  host: ${CLICKHOUSE_HOST:124.221.104.56}
  port: ${CLICKHOUSE_PORT:8123}
  database: ${CLICKHOUSE_DB:vrd_bigdata}
  username: ${CLICKHOUSE_USER:default}
  password: ${CLICKHOUSE_PASSWORD:}
  connection-timeout: 10000
  socket-timeout: 30000
  insert-batch-size: 500

storage:
  type: ${STORAGE_TYPE:MINIO}

file:
  log:
    temp-path: /data/vrd/logs/temp