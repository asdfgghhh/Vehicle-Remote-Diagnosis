server:
  port: 9080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: service-auth
          uri: lb://service-auth
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: service-vehicle
          uri: lb://service-vehicle
          predicates:
            - Path=/api/vehicle/**
          filters:
            - StripPrefix=1
        - id: service-ecu-log-vehicle
          uri: lb://service-access
          predicates:
            - Path=/api/ecu-log/vehicle/**
          filters:
            - StripPrefix=1
        - id: service-access-signal-vehicle
          uri: lb://service-access
          predicates:
            - Path=/api/signal/vehicle/**
          filters:
            - StripPrefix=1
        - id: service-ecu-log
          uri: lb://service-ecu-log
          predicates:
            - Path=/api/ecu-log/**
          filters:
            - StripPrefix=1
        - id: service-dbc
          uri: lb://service-dbc
          predicates:
            - Path=/api/dbc/**
          filters:
            - StripPrefix=1
        - id: service-signal
          uri: lb://service-signal
          predicates:
            - Path=/api/signal/**
          filters:
            - StripPrefix=1
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
  redis:
    host: ${REDIS_HOST:124.221.104.56}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DATABASE:0}
    timeout: ${REDIS_TIMEOUT:3000ms}
    password: ${REDIS_PASSWORD:}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.vrd.gateway: DEBUG

gateway:
  auth:
    enabled: true
    introspect-url: http://service-auth/auth/introspect
    timeout: 5000
    white-list:
      - /api/auth/login
      - /api/auth/register
      - /api/auth/introspect
      - /actuator/**