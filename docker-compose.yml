version: '3.8'

services:
  service-gateway:
    image: 124.221.104.56:8211/vrd/service-gateway:latest
    container_name: vrd-service-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=nacos:8848
    networks:
      - vrd-network

  service-auth:
    image: 124.221.104.56:8211/vrd/service-auth:latest
    container_name: vrd-service-auth
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=nacos:8848
    networks:
      - vrd-network

  service-vehicle:
    image: 124.221.104.56:8211/vrd/service-vehicle:latest
    container_name: vrd-service-vehicle
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=nacos:8848
    volumes:
      - /data/vrd/uploads:/data/vrd/uploads
    networks:
      - vrd-network

  service-ecu-log:
    image: 124.221.104.56:8211/vrd/service-ecu-log:latest
    container_name: vrd-service-ecu-log
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=nacos:8848
    volumes:
      - /data/vrd/logs:/data/vrd/logs
    networks:
      - vrd-network

  service-dbc:
    image: 124.221.104.56:8211/vrd/service-dbc:latest
    container_name: vrd-service-dbc
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=nacos:8848
    volumes:
      - /data/vrd/dbc:/data/vrd/dbc
    networks:
      - vrd-network

  service-signal:
    image: 124.221.104.56:8211/vrd/service-signal:latest
    container_name: vrd-service-signal
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=nacos:8848
    networks:
      - vrd-network

  service-access:
    image: 124.221.104.56:8211/vrd/service-access:latest
    container_name: vrd-service-access
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=nacos:8848
    volumes:
      - /data/vrd/logs:/data/vrd/logs
      - /data/vrd/storage:/data/vrd/storage
    networks:
      - vrd-network

  frontend:
    image: 124.221.104.56:8211/vrd/frontend:latest
    container_name: vrd-frontend
    ports:
      - "3000:3000"
    networks:
      - vrd-network

networks:
  vrd-network:
    driver: bridge