version: '2.4'

services:
  log:
    image: goharbor/harbor-log:v2.11.0
    container_name: harbor-log
    restart: always
    volumes:
      - /var/log/harbor/:/var/log/harbor/:z
      - ./common/config/log/:/etc/logrotate.d/:z
    networks:
      - harbor

  registry:
    image: goharbor/registry-photon:v2.11.0
    container_name: harbor-registry
    restart: always
    volumes:
      - /home/harbor/data/registry:/storage:z
      - ./common/config/registry/:/etc/registry/:z
      - ./common/config/registryctl/:/etc/registryctl/:z
    networks:
      - harbor
    depends_on:
      - log
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "registry"

  registryctl:
    image: goharbor/harbor-registryctl:v2.11.0
    container_name: harbor-registryctl
    restart: always
    volumes:
      - /home/harbor/data/registry:/storage:z
      - ./common/config/registry/:/etc/registry/:z
      - ./common/config/registryctl/:/etc/registryctl/:z
    networks:
      - harbor
    depends_on:
      - log
    env_file:
      - ./common/config/registryctl/env
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "registryctl"

  postgresql:
    image: goharbor/harbor-db:v2.11.0
    container_name: harbor-db
    restart: always
    volumes:
      - /home/harbor/data/database:/var/lib/postgresql/data:z
    networks:
      - harbor
    depends_on:
      - log
    env_file:
      - ./common/config/db/env
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "postgresql"

  core:
    image: goharbor/harbor-core:v2.11.0
    container_name: harbor-core
    restart: always
    volumes:
      - /home/harbor/data/ca_download:/etc/core/ca_download:z
      - /home/harbor/data/:/data/:z
      - ./common/config/core/:/etc/core/:z
      - ./common/config/core/private_key.pem:/etc/core/private_key.pem:z
      - ./common/config/core/app.conf:/etc/core/app.conf:z
    networks:
      - harbor
    depends_on:
      - registry
      - postgresql
      - redis
      - log
    env_file:
      - ./common/config/core/env
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "core"

  portal:
    image: goharbor/harbor-portal:v2.11.0
    container_name: harbor-portal
    restart: always
    volumes:
      - ./common/config/portal/nginx.conf:/etc/nginx/nginx.conf:z
    networks:
      - harbor
    depends_on:
      - log
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "portal"

  jobservice:
    image: goharbor/harbor-jobservice:v2.11.0
    container_name: harbor-jobservice
    restart: always
    volumes:
      - /home/harbor/data/job_logs:/var/log/jobservice:z
      - ./common/config/jobservice/:/etc/jobservice/:z
    networks:
      - harbor
    depends_on:
      - redis
      - core
      - log
    env_file:
      - ./common/config/jobservice/env
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "jobservice"

  redis:
    image: goharbor/harbor-redis:v2.11.0
    container_name: harbor-redis
    restart: always
    volumes:
      - /home/harbor/data/redis:/var/lib/redis:z
    networks:
      - harbor
    depends_on:
      - log
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "redis"

  proxy:
    image: goharbor/harbor-nginx:v2.11.0
    container_name: harbor-proxy
    restart: always
    volumes:
      - ./common/config/nginx:/etc/nginx:z
      - /home/harbor/data/secret/keys:/etc/keys:z
    ports:
      - "80:8080"
    networks:
      - harbor
    depends_on:
      - registry
      - core
      - portal
      - log
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "proxy"

networks:
  harbor:
    external: false